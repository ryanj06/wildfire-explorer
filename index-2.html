<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>California Wildfire Scar Explorer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0c0b09;--surface:#131210;--surface2:#1a1917;--surface3:#222120;
      --border:#2c2a26;--border2:#3a3835;--accent:#e8541e;--accent2:#f5a623;
      --green:#5aab45;--text:#ede9df;--text-dim:#7c7a72;--text-faint:#3e3d38;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;overflow:hidden}
    #app{display:grid;grid-template-rows:52px 1fr;grid-template-columns:340px 1fr;height:100vh}
    header{grid-column:1/-1;display:flex;align-items:center;gap:16px;padding:0 20px;border-bottom:1px solid var(--border);background:var(--surface);position:relative}
    header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--accent) 0%,transparent 40%)}
    header h1{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px}
    header h1 span{color:var(--accent)}
    .header-meta{margin-left:auto;display:flex;gap:12px;align-items:center}
    .hpill{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-faint);border:1px solid var(--border);padding:3px 8px}
    .hpill.live{border-color:var(--green);color:var(--green)}
    .hpill.live::before{content:'● ';animation:blink 1.4s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    #sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .sbs{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
    .sbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px}
    .fire-list{display:flex;flex-direction:column;gap:5px}
    .fire-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);font-family:'DM Mono',monospace;font-size:11px;padding:9px 12px;cursor:pointer;text-align:left;transition:all .12s;display:grid;grid-template-columns:1fr auto;gap:4px;align-items:center}
    .fire-btn:hover{border-color:var(--accent);color:var(--text);background:var(--surface3)}
    .fire-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .fb-name{font-size:12px}.fb-meta{font-size:9px;opacity:.65;text-align:right;line-height:1.6}
    .layer-toggle{display:flex}
    .layer-btn{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text-faint);font-family:'DM Mono',monospace;font-size:10px;padding:8px 6px;cursor:pointer;text-align:center;letter-spacing:1px;text-transform:uppercase;transition:all .12s}
    .layer-btn:first-child{border-right:none}
    .layer-btn.active{border-color:var(--accent2);color:var(--accent2);background:rgba(245,166,35,.06)}
    .layer-btn:hover:not(.active){color:var(--text-dim)}
    .tl-date-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
    .tl-date{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent2);line-height:1;transition:color .3s}
    .tl-idx{font-size:9px;color:var(--text-faint);letter-spacing:1px}
    .tl-phase{font-size:10px;letter-spacing:.5px;color:var(--text-dim);margin-bottom:12px;min-height:14px}
    .slider-wrap{position:relative;padding:0 2px;margin-bottom:6px}
    #tl-track-bg{width:100%;height:14px;display:block}
    #timeline-slider{-webkit-appearance:none;position:absolute;top:0;left:0;width:100%;height:14px;background:transparent;outline:none;cursor:pointer;z-index:10}
    #timeline-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--accent2);border-radius:0;cursor:pointer;box-shadow:0 0 8px rgba(245,166,35,.6)}
    #timeline-slider::-moz-range-thumb{width:14px;height:14px;background:var(--accent2);border-radius:0;cursor:pointer;border:none}
    #ndvi-chart{margin-top:10px}
    #phase-note{margin-top:10px;padding:8px 10px;border-left:2px solid var(--accent);background:var(--surface2);font-size:10px;color:var(--text-dim);letter-spacing:.3px;line-height:1.6;min-height:32px;transition:border-color .3s}
    #fire-info{flex:1;overflow-y:auto;padding:14px 16px}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .info-card{background:var(--surface2);border:1px solid var(--border);padding:10px}
    .ic-label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-faint);margin-bottom:4px}
    .ic-val{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1}
    .ic-val.fire{color:var(--accent)}.ic-val.amber{color:var(--accent2)}.ic-val.green{color:var(--green)}
    .info-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--text-faint);gap:10px}
    .ir-key{color:var(--text-faint);font-size:9px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
    .ir-val{color:var(--text-dim);font-size:10px;text-align:right}
    #map-container{position:relative;overflow:hidden;background:#000;cursor:crosshair}
    #map-tiles{position:absolute;inset:0}
    #map-svg{position:absolute;inset:0;pointer-events:none}
    .map-badge{position:absolute;background:rgba(19,18,16,.92);border:1px solid var(--border);backdrop-filter:blur(4px);z-index:20}
    #map-date-badge{top:14px;left:14px;padding:10px 16px}
    .mdb-date{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--accent2);line-height:1}
    .mdb-phase{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-top:2px}
    .mdb-ndvi{margin-top:6px;font-size:9px;color:var(--text-faint);letter-spacing:.5px}
    .mdb-ndvi span{color:var(--green);font-size:13px;font-family:'Bebas Neue',sans-serif}
    #map-legend{bottom:14px;right:14px;padding:10px 14px;min-width:140px}
    .legend-title{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px}
    .legend-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .legend-swatch{width:12px;height:12px;flex-shrink:0}
    .legend-lbl{font-size:9px;color:var(--text-dim);letter-spacing:.5px}
    #map-controls{bottom:14px;left:14px;padding:6px;display:flex;flex-direction:column;gap:2px}
    .map-ctrl-btn{width:28px;height:28px;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:monospace;transition:all .1s}
    .map-ctrl-btn:hover{border-color:var(--accent2);color:var(--accent2)}
    #tooltip{position:absolute;background:var(--surface);border:1px solid var(--accent);padding:10px 14px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .1s;z-index:100;max-width:220px}
    .tt-title{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--accent);letter-spacing:1px;margin-bottom:5px}
    .tt-row{color:var(--text-dim);font-size:10px;margin-top:3px}
    .tt-row span{color:var(--text)}
    .tt-ndvi-bar{margin-top:8px;height:4px;background:var(--border);position:relative}
    .tt-ndvi-fill{position:absolute;top:0;left:0;height:100%;background:var(--green);transition:width .3s}
    .tt-ndvi-label{font-size:9px;color:var(--text-faint);margin-top:3px;letter-spacing:.5px}
    #loading{position:absolute;inset:0;background:rgba(12,11,9,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;transition:opacity .25s}
    #loading.hidden{opacity:0;pointer-events:none}
    .loading-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:4px;color:var(--text-dim)}
    @keyframes pulse-ring{0%{r:10;opacity:.8}100%{r:45;opacity:0}}
    .pulse-ring{animation:pulse-ring 2s ease-out infinite}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border2)}
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>CALIFORNIA <span>WILDFIRE</span> SCAR EXPLORER</h1>
    <div class="header-meta">
      <span class="hpill">MODIS / NASA GIBS</span>
      <span class="hpill">Terra Satellite</span>
      <span class="hpill live">Live Imagery</span>
    </div>
  </header>
  <div id="sidebar">
    <div class="sbs"><div class="sbl">Select Fire Event</div><div class="fire-list" id="fire-list"></div></div>
    <div class="sbs"><div class="sbl">Satellite Layer</div>
      <div class="layer-toggle">
        <button class="layer-btn active" data-layer="truecolor">True Color</button>
        <button class="layer-btn" data-layer="ndvi">Vegetation / NDVI</button>
      </div>
    </div>
    <div class="sbs" id="timeline-section">
      <div class="sbl">Observation Timeline</div>
      <div class="tl-date-row"><div class="tl-date" id="tl-date">—</div><div class="tl-idx" id="tl-idx"></div></div>
      <div class="tl-phase" id="tl-phase">Select a fire to begin</div>
      <div class="slider-wrap">
        <svg id="tl-track-bg" height="14"></svg>
        <input type="range" id="timeline-slider" min="0" max="10" step="1" value="0"/>
      </div>
      <div id="ndvi-chart"></div>
      <div id="phase-note">—</div>
    </div>
    <div id="fire-info">
      <div class="sbl">Fire Statistics</div>
      <div class="info-grid" id="info-cards"></div>
      <div id="info-rows"></div>
    </div>
  </div>
  <div id="map-container">
    <div id="map-tiles"></div>
    <svg id="map-svg"></svg>
    <div class="map-badge" id="map-date-badge">
      <div class="mdb-date" id="mdb-date">—</div>
      <div class="mdb-phase" id="mdb-phase">Select a fire event</div>
      <div class="mdb-ndvi" id="mdb-ndvi"></div>
    </div>
    <div class="map-badge" id="map-legend">
      <div class="legend-title">Phase Legend</div>
      <div class="legend-row"><div class="legend-swatch" style="background:#5aab45"></div><span class="legend-lbl">Pre-fire baseline</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:#e8541e"></div><span class="legend-lbl">Active fire</span></div>
      <div class="legend-row"><div class="legend-swatch" style="background:#f5a623"></div><span class="legend-lbl">Recovery</span></div>
    </div>
    <div class="map-badge" id="map-controls">
      <button class="map-ctrl-btn" id="zoom-in">+</button>
      <button class="map-ctrl-btn" id="zoom-out">−</button>
    </div>
    <div id="tooltip">
      <div class="tt-title" id="tt-title"></div>
      <div class="tt-row" id="tt-r1"></div>
      <div class="tt-row" id="tt-r2"></div>
      <div class="tt-row" id="tt-r3"></div>
      <div class="tt-ndvi-bar"><div class="tt-ndvi-fill" id="tt-ndvi-fill"></div></div>
      <div class="tt-ndvi-label" id="tt-ndvi-lbl"></div>
    </div>
    <div id="loading"><div class="loading-spinner"></div><div class="loading-text">Loading Imagery</div></div>
  </div>
</div>
<script>
const LAYERS={
  truecolor:{id:"MODIS_Terra_CorrectedReflectance_TrueColor",ext:"jpg",tms:"GoogleMapsCompatible_Level9"},
  ndvi:{id:"MODIS_Terra_Vegetation_Indices_16Day_vi",ext:"png",tms:"GoogleMapsCompatible_Level7"}
};
function gibsUrl(lk,date,z,x,y){
  const L=LAYERS[lk];
  return `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/${L.id}/default/${date}/${L.tms}/${z}/${y}/${x}.${L.ext}`;
}
const TILE_SIZE=256;
function lngLatToWorld(lng,lat,zoom){
  const scale=TILE_SIZE*Math.pow(2,zoom);
  const x=(lng+180)/360*scale;
  const sinLat=Math.sin(lat*Math.PI/180);
  const y=(0.5-Math.log((1+sinLat)/(1-sinLat))/(4*Math.PI))*scale;
  return{x,y};
}
let fires=[],selectedFire=null,selectedDateIndex=0,selectedLayer="truecolor",mapZoom=8;
let mapCenter={lng:-119.5,lat:37.5};
const container=document.getElementById("map-container");
const tilesDiv=document.getElementById("map-tiles");
const mapSvg=d3.select("#map-svg");
const tooltip=document.getElementById("tooltip");
let loadingTimer=null;

function getPhase(fire,date){
  if(!fire||!date)return"none";
  if(date<fire.ignition)return"pre";
  if(date<=fire.peak)return"ignition";
  if(date<=fire.contained)return"active";
  return"recovery";
}
function getPhaseLabel(fire,date){
  const p=getPhase(fire,date);
  if(p==="pre")return"Pre-fire baseline";
  if(p==="ignition")return"🔥 Active — fire spreading";
  if(p==="active")return"🔥 Active — containment effort";
  const yr=parseInt(date.slice(0,4))-parseInt(fire.ignition.slice(0,4));
  return yr<1?"Recovery — immediate aftermath":`Recovery — ${yr} year${yr>1?"s":""} later`;
}
function getPhaseColor(p){
  if(p==="pre")return"#5aab45";
  if(p==="ignition"||p==="active")return"#e8541e";
  return"#f5a623";
}
function getSelectedDate(){return selectedFire?selectedFire.dates[selectedDateIndex]:null;}
function getCurrentNDVI(){return selectedFire?selectedFire.ndvi[selectedDateIndex]:null;}

function renderTiles(){
  const W=container.clientWidth,H=container.clientHeight;
  const date=getSelectedDate();
  if(!date)return;
  showLoading();
  d3.select(tilesDiv).selectAll("img").remove();
  const{x:cx,y:cy}=lngLatToWorld(mapCenter.lng,mapCenter.lat,mapZoom);
  const offX=cx%TILE_SIZE,offY=cy%TILE_SIZE;
  const tilesX=Math.ceil(W/TILE_SIZE)+2,tilesY=Math.ceil(H/TILE_SIZE)+2;
  const startTX=Math.floor(cx/TILE_SIZE)-Math.floor(tilesX/2);
  const startTY=Math.floor(cy/TILE_SIZE)-Math.floor(tilesY/2);
  const maxTile=Math.pow(2,mapZoom)-1;
  let loaded=0,total=0;
  for(let dy=0;dy<tilesY;dy++){
    for(let dx=0;dx<tilesX;dx++){
      const tx=startTX+dx,ty=startTY+dy;
      if(tx<0||ty<0||tx>maxTile||ty>maxTile)continue;
      const pixX=(dx-Math.floor(tilesX/2))*TILE_SIZE+W/2-offX;
      const pixY=(dy-Math.floor(tilesY/2))*TILE_SIZE+H/2-offY;
      const url=gibsUrl(selectedLayer,date,mapZoom,tx,ty);
      total++;
      d3.select(tilesDiv).append("img")
        .attr("src",url)
        .style("position","absolute").style("left",pixX+"px").style("top",pixY+"px")
        .style("width",TILE_SIZE+"px").style("height",TILE_SIZE+"px").style("image-rendering","pixelated")
        .on("load",function(){loaded++;if(loaded>=total)hideLoading();})
        .on("error",function(){d3.select(this).style("opacity","0");loaded++;if(loaded>=total)hideLoading();});
    }
  }
  if(total===0)hideLoading();
  updateSVGOverlay();
}
function showLoading(){clearTimeout(loadingTimer);document.getElementById("loading").classList.remove("hidden");loadingTimer=setTimeout(hideLoading,7000);}
function hideLoading(){clearTimeout(loadingTimer);document.getElementById("loading").classList.add("hidden");}

function updateSVGOverlay(){
  if(!selectedFire)return;
  const W=container.clientWidth,H=container.clientHeight;
  mapSvg.attr("width",W).attr("height",H).selectAll("*").remove();
  const{x:cx,y:cy}=lngLatToWorld(mapCenter.lng,mapCenter.lat,mapZoom);
  const project=(lng,lat)=>{const p=lngLatToWorld(lng,lat,mapZoom);return[W/2+(p.x-cx),H/2+(p.y-cy)];};
  const[fx,fy]=project(selectedFire.center[0],selectedFire.center[1]);
  const phase=getPhase(selectedFire,getSelectedDate());
  const color=getPhaseColor(phase);
  const g=mapSvg.append("g");
  g.append("circle").attr("cx",fx).attr("cy",fy).attr("r",10).attr("fill","none")
    .attr("stroke",color).attr("stroke-width",1.5).attr("class","pulse-ring").attr("stroke-opacity",.7);
  g.append("circle").attr("cx",fx).attr("cy",fy).attr("r",36).attr("fill","none")
    .attr("stroke",color).attr("stroke-width",.8).attr("stroke-opacity",.3).attr("stroke-dasharray","3 3");
  g.append("circle").attr("cx",fx).attr("cy",fy).attr("r",6)
    .attr("fill",color).attr("fill-opacity",.3).attr("stroke",color).attr("stroke-width",1.5)
    .attr("pointer-events","all").style("cursor","pointer")
    .on("mouseover",e=>showTooltip(e,selectedFire))
    .on("mousemove",e=>moveTooltip(e))
    .on("mouseout",()=>hideTooltip());
  g.append("text").attr("x",fx).attr("y",fy-48).attr("text-anchor","middle")
    .attr("fill",color).attr("font-family","'Bebas Neue',sans-serif")
    .attr("font-size","13px").attr("letter-spacing","2px").attr("opacity",.9)
    .text(selectedFire.name.toUpperCase());
  [[-44,-12],[ 12, 44]].forEach(([a,b])=>{
    g.append("line").attr("x1",fx+a).attr("y1",fy).attr("x2",fx+b).attr("y2",fy)
      .attr("stroke",color).attr("stroke-width",.8).attr("opacity",.4);
  });
  g.append("line").attr("x1",fx).attr("y1",fy-12).attr("x2",fx).attr("y2",fy-44)
    .attr("stroke",color).attr("stroke-width",.8).attr("opacity",.4);
  g.append("line").attr("x1",fx).attr("y1",fy+12).attr("x2",fx).attr("y2",fy+44)
    .attr("stroke",color).attr("stroke-width",.8).attr("opacity",.4);
}

function showTooltip(event,fire){
  const ndvi=getCurrentNDVI();
  document.getElementById("tt-title").textContent=fire.name;
  document.getElementById("tt-r1").innerHTML=`Acres: <span>${fire.acres.toLocaleString()}</span>`;
  document.getElementById("tt-r2").innerHTML=`Phase: <span>${getPhaseLabel(fire,getSelectedDate())}</span>`;
  document.getElementById("tt-r3").innerHTML=`NDVI: <span>${ndvi!=null?ndvi.toFixed(2):"—"}</span>`;
  document.getElementById("tt-ndvi-fill").style.width=(ndvi*100)+"%";
  document.getElementById("tt-ndvi-lbl").textContent="Vegetation health index (0–1)";
  tooltip.style.opacity="1";moveTooltip(event);
}
function moveTooltip(event){
  const r=container.getBoundingClientRect();
  let tx=event.clientX-r.left+16,ty=event.clientY-r.top-10;
  if(tx+230>container.clientWidth)tx-=246;
  tooltip.style.left=tx+"px";tooltip.style.top=ty+"px";
}
function hideTooltip(){tooltip.style.opacity="0";}

function renderNDVIChart(fire){
  const el=document.getElementById("ndvi-chart");
  el.innerHTML="";
  if(!fire)return;
  const W=308,H=78,m={top:16,right:8,bottom:20,left:26};
  const w=W-m.left-m.right,h=H-m.top-m.bottom;
  const svg2=d3.select(el).append("svg").attr("width",W).attr("height",H);
  const g=svg2.append("g").attr("transform",`translate(${m.left},${m.top})`);
  const dates=fire.dates.map(d=>new Date(d));
  const ndvi=fire.ndvi;
  const xScale=d3.scaleTime().domain([dates[0],dates[dates.length-1]]).range([0,w]);
  const yScale=d3.scaleLinear().domain([0,1]).range([h,0]);
  const ignDate=new Date(fire.ignition),contDate=new Date(fire.contained);
  [{x0:dates[0],x1:ignDate,color:"#5aab45",op:.08},
   {x0:ignDate,x1:contDate,color:"#e8541e",op:.10},
   {x0:contDate,x1:dates[dates.length-1],color:"#f5a623",op:.08}].forEach(b=>{
    const x0=Math.max(0,xScale(b.x0)),x1=Math.min(w,xScale(b.x1));
    if(x1>x0)g.append("rect").attr("x",x0).attr("y",0).attr("width",x1-x0).attr("height",h).attr("fill",b.color).attr("opacity",b.op);
  });
  g.append("line").attr("x1",0).attr("x2",w).attr("y1",yScale(.5)).attr("y2",yScale(.5))
    .attr("stroke","#3e3d38").attr("stroke-width",.5).attr("stroke-dasharray","3 2");
  const area=d3.area().x((d,i)=>xScale(dates[i])).y0(h).y1(d=>yScale(d)).curve(d3.curveCatmullRom);
  g.append("path").datum(ndvi).attr("d",area).attr("fill","#5aab45").attr("opacity",.12);
  const line=d3.line().x((d,i)=>xScale(dates[i])).y(d=>yScale(d)).curve(d3.curveCatmullRom);
  g.append("path").datum(ndvi).attr("d",line).attr("fill","none").attr("stroke","#5aab45").attr("stroke-width",1.5).attr("opacity",.85);
  [{date:ignDate,color:"#e8541e",label:"IGN"},{date:contDate,color:"#f5a623",label:"CNT"}].forEach(ev=>{
    const ex=xScale(ev.date);
    if(ex<0||ex>w)return;
    g.append("line").attr("x1",ex).attr("x2",ex).attr("y1",0).attr("y2",h)
      .attr("stroke",ev.color).attr("stroke-width",1).attr("stroke-dasharray","2 2").attr("opacity",.7);
    g.append("text").attr("x",ex+2).attr("y",8).attr("fill",ev.color)
      .attr("font-family","'DM Mono',monospace").attr("font-size","7px").attr("letter-spacing",".5px").text(ev.label);
  });
  g.selectAll(".obs-dot").data(ndvi).enter().append("circle").attr("class","obs-dot")
    .attr("cx",(d,i)=>xScale(dates[i])).attr("cy",d=>yScale(d))
    .attr("r",(d,i)=>i===selectedDateIndex?5:3)
    .attr("fill",(d,i)=>i===selectedDateIndex?"#f5a623":"#5aab45")
    .attr("stroke",(d,i)=>i===selectedDateIndex?"#f5a623":"none")
    .attr("stroke-width",1.5).attr("opacity",(d,i)=>i===selectedDateIndex?1:.6);
  const selX=xScale(dates[selectedDateIndex]);
  g.append("line").attr("x1",selX).attr("x2",selX).attr("y1",-6).attr("y2",h)
    .attr("stroke","#f5a623").attr("stroke-width",1.5).attr("opacity",.9);
  [0,.5,1].forEach(v=>{
    g.append("text").attr("x",-4).attr("y",yScale(v)+3).attr("text-anchor","end")
      .attr("fill","#3e3d38").attr("font-family","'DM Mono',monospace").attr("font-size","7px").text(v.toFixed(1));
  });
  svg2.append("text").attr("x",m.left).attr("y",10).attr("fill","#3e3d38")
    .attr("font-family","'DM Mono',monospace").attr("font-size","7px").attr("letter-spacing","1.5px")
    .text("NDVI — VEGETATION HEALTH INDEX");
}

function renderSliderTrack(fire){
  const svg2=d3.select("#tl-track-bg");
  svg2.selectAll("*").remove();
  if(!fire)return;
  const W=document.getElementById("tl-track-bg").getBoundingClientRect().width||290;
  svg2.attr("width",W);
  const dates=fire.dates,n=dates.length-1;
  dates.forEach((d,i)=>{
    if(i>=n)return;
    const x0=(i/n)*W,x1=((i+1)/n)*W;
    svg2.append("rect").attr("x",x0).attr("y",4).attr("width",x1-x0).attr("height",6)
      .attr("fill",getPhaseColor(getPhase(fire,d))).attr("opacity",.55);
  });
  dates.forEach((d,i)=>{
    const x=(i/n)*W;
    svg2.append("line").attr("x1",x).attr("x2",x).attr("y1",2).attr("y2",12)
      .attr("stroke","#0c0b09").attr("stroke-width",1.5);
  });
  const ignIdx=dates.findIndex(d=>d>=fire.ignition);
  if(ignIdx>=0){
    const ix=(ignIdx/n)*W;
    svg2.append("polygon").attr("points",`${ix},0 ${ix-4},4 ${ix+4},4`)
      .attr("fill","#e8541e").attr("opacity",.9);
  }
}

function updateAll(){
  const date=getSelectedDate();
  const phase=selectedFire?getPhaseLabel(selectedFire,date):"Select a fire to begin";
  const ndvi=getCurrentNDVI();
  const color=selectedFire?getPhaseColor(getPhase(selectedFire,date)):"#7c7a72";
  document.getElementById("tl-date").textContent=date||"—";
  document.getElementById("tl-date").style.color=color;
  document.getElementById("tl-idx").textContent=selectedFire?`${selectedDateIndex+1} / ${selectedFire.dates.length}`:"";
  document.getElementById("tl-phase").textContent=phase;
  const pkey=getPhase(selectedFire,date);
  const note=selectedFire?.phaseNotes?.[pkey]||"—";
  const pnEl=document.getElementById("phase-note");
  pnEl.textContent=note;pnEl.style.borderColor=color;
  document.getElementById("mdb-date").textContent=date||"—";
  document.getElementById("mdb-phase").textContent=phase;
  const ndviEl=document.getElementById("mdb-ndvi");
  ndviEl.innerHTML=ndvi!=null?`NDVI <span>${ndvi.toFixed(2)}</span> · ${ndviLabel(ndvi)}`:"";
}
function ndviLabel(v){
  if(v>=.6)return"Dense vegetation";
  if(v>=.4)return"Moderate vegetation";
  if(v>=.2)return"Sparse / recovering";
  return"Bare / burned";
}
function updateInfoPanel(fire){
  const cardsEl=document.getElementById("info-cards");
  const rowsEl=document.getElementById("info-rows");
  if(!fire){cardsEl.innerHTML="";rowsEl.innerHTML="";return;}
  cardsEl.innerHTML=`
    <div class="info-card"><div class="ic-label">Acres Burned</div><div class="ic-val fire">${(fire.acres/1000).toFixed(0)}K</div></div>
    <div class="info-card"><div class="ic-label">Structures</div><div class="ic-val amber">${fire.structures.toLocaleString()}</div></div>
    <div class="info-card"><div class="ic-label">Ignition</div><div class="ic-val" style="font-size:13px">${fire.ignition}</div></div>
    <div class="info-card"><div class="ic-label">Contained</div><div class="ic-val green" style="font-size:13px">${fire.contained}</div></div>`;
  const days=Math.round((new Date(fire.contained)-new Date(fire.ignition))/(1000*60*60*24));
  rowsEl.innerHTML=[["County",fire.county],["Cause",fire.cause],["Duration",`${days} days`]]
    .map(([k,v])=>`<div class="info-row"><span class="ir-key">${k}</span><span class="ir-val">${v}</span></div>`).join("");
}

function selectFire(fire){
  selectedFire=fire;selectedDateIndex=0;
  mapCenter={lng:fire.center[0],lat:fire.center[1]};mapZoom=fire.zoom;
  document.querySelectorAll(".fire-btn").forEach(b=>b.classList.toggle("active",b.dataset.id===fire.id));
  const slider=document.getElementById("timeline-slider");
  slider.max=fire.dates.length-1;slider.value=0;
  renderSliderTrack(fire);updateAll();updateInfoPanel(fire);renderNDVIChart(fire);renderTiles();
}
function selectDateIndex(idx){
  selectedDateIndex=idx;
  document.getElementById("timeline-slider").value=idx;
  updateAll();renderNDVIChart(selectedFire);renderTiles();
}

function buildFireList(data){
  const list=document.getElementById("fire-list");
  list.innerHTML="";
  data.forEach(fire=>{
    const btn=document.createElement("button");
    btn.className="fire-btn";btn.dataset.id=fire.id;
    btn.innerHTML=`<span class="fb-name">${fire.name}</span><span class="fb-meta">${fire.year}<br>${(fire.acres/1000).toFixed(0)}K ac</span>`;
    btn.addEventListener("click",()=>selectFire(fire));
    list.appendChild(btn);
  });
}

document.getElementById("timeline-slider").addEventListener("input",function(){selectDateIndex(parseInt(this.value));});
document.querySelectorAll(".layer-btn").forEach(btn=>{
  btn.addEventListener("click",function(){
    document.querySelectorAll(".layer-btn").forEach(b=>b.classList.remove("active"));
    this.classList.add("active");selectedLayer=this.dataset.layer;renderTiles();
  });
});
document.getElementById("zoom-in").addEventListener("click",()=>{mapZoom=Math.min(12,mapZoom+1);renderTiles();});
document.getElementById("zoom-out").addEventListener("click",()=>{mapZoom=Math.max(4,mapZoom-1);renderTiles();});
let dragging=false,dragStart=null;
container.addEventListener("mousedown",e=>{
  if(e.target.closest(".map-badge"))return;
  dragging=true;dragStart={x:e.clientX,y:e.clientY,lng:mapCenter.lng,lat:mapCenter.lat};
  container.style.cursor="grabbing";
});
document.addEventListener("mousemove",e=>{
  if(!dragging)return;
  const dx=e.clientX-dragStart.x,dy=e.clientY-dragStart.y;
  const scale=TILE_SIZE*Math.pow(2,mapZoom);
  const{x:cx0,y:cy0}=lngLatToWorld(dragStart.lng,dragStart.lat,mapZoom);
  const dLng=-(dx/scale)*360;
  const newLat=(2*Math.atan(Math.exp((0.5-(cy0-dy)/scale)*2*Math.PI))-Math.PI/2)*180/Math.PI;
  mapCenter.lng=dragStart.lng+dLng;mapCenter.lat=Math.max(-85,Math.min(85,newLat));
  renderTiles();
});
document.addEventListener("mouseup",()=>{dragging=false;container.style.cursor="crosshair";});
container.addEventListener("wheel",e=>{
  e.preventDefault();mapZoom=Math.max(4,Math.min(12,mapZoom+(e.deltaY>0?-1:1)));renderTiles();
},{passive:false});
window.addEventListener("resize",()=>{if(selectedFire){renderTiles();renderSliderTrack(selectedFire);}});

d3.json("fires.json").then(data=>{
  fires=data;buildFireList(fires);selectFire(fires[0]);
}).catch(err=>{
  console.error("fires.json load failed:",err);
  document.querySelector(".loading-text").textContent="ERROR LOADING DATA";
});
</script>
</body>
</html>
